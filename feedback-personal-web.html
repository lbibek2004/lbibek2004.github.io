<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Feedback — Bibek Luitel</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="stylesheet" href="styles/webpagestyles.css">
        <link rel="stylesheet" href="styles/main-body.css">
        <link rel="stylesheet" href="styles/header.css">
        <link rel="stylesheet" href="styles/footer.css">
        <link rel="icon" type="image/png" sizes="64x64" href="/Website-Images/favicon.png">
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" defer></script>
        <script src="script/personal-web.js" defer></script>
    </head>
    <body>
        <div class="noise-overlay"></div>
        <div class="cursor-dot"></div>
        <div class="cursor-ring"></div>

        <header class="header">
            <div class="left-part">
                <div class="personal-logo-container">
                    <a href="/#intro-container">
                        <img class="personal-logo" src="Website-Images/bibekluitel-logo-white-transparent.png">
                        <div class="tooltip">Home</div>
                    </a>
                </div>
            </div>
            <div class="right-part">
                <nav>
                    <input type="checkbox" id="check">
                    <label for="check" id="checkbtn">
                        <i class="fa fa-bars"></i>
                    </label>
                    <ul>
                        <li><a class="active" href="feedback-personal-web.html">Feedback</a></li>
                        <li>
                            <a href="#">Languages &#9660;</a>
                            <ul class="dropdown-list">
                                <li><a href="/#html">HTML</a></li>
                                <li><a href="/#css">CSS</a></li>
                                <li><a href="/#javascript">JavaScript</a></li>
                            </ul>
                        </li>
                        <li><a href="/#my-details">About Me</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <div id="feedback-form-container">
            <div class="feedback-bg">
                <div class="orb orb-1"></div>
                <div class="orb orb-2"></div>
                <div class="hero-grid"></div>
            </div>
            <div class="feedback-deco-bracket">{</div>
            <div id="feedback-form-elements">
                <div class="feedback-eyebrow section-eyebrow">
                    <span class="eyebrow-num font-mono">03</span>
                    <span class="eyebrow-label">Feedback</span>
                </div>
                <h2>Your thoughts<br><em>matter.</em></h2>
                <p class="feedback-subtitle">Found something to improve? Have a suggestion? I'd love to hear it.</p>
                <form id="feedback-form">
                    <div class="form-field">
                        <label for="feedback-name" class="form-label">Name</label>
                        <input id="feedback-name" name="name" type="text" placeholder="Your name" required>
                    </div>
                    <div class="form-field">
                        <label for="feedback-email" class="form-label">Email</label>
                        <input id="feedback-email" name="email" type="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-field">
                        <label for="user-message" class="form-label">Message</label>
                        <input name="message" id="user-message" class="message-input" type="text" placeholder="Share your thoughts..." required>
                    </div>
                    <button id="send-button" type="submit">
                        <span>Send Feedback</span>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>

        <script>
        const dot = document.querySelector('.cursor-dot');
        const ring = document.querySelector('.cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            dot.style.left = mx + 'px'; dot.style.top = my + 'px';
        });
        (function tick() {
            rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
            ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
            requestAnimationFrame(tick);
        })();
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => { ring.classList.add('hover'); dot.classList.add('hover'); });
            el.addEventListener('mouseleave', () => { ring.classList.remove('hover'); dot.classList.remove('hover'); });
        });
        window.addEventListener('scroll', () =>
            document.querySelector('.header').classList.toggle('scrolled', window.scrollY > 50)
        );
        </script>
    </body>
</html>
